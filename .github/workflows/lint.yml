name: Lint

on: [push, pull_request]

jobs:
  lint:
    name: Run RuboCop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.8'
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
